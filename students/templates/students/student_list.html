<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School System - Student Directory</title>
    <!-- The Bootstrap "Magic Link" -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">Student Directory</h2>
            </div>
            <div class="card-body">
                <a href="{% url 'add_student' %}" class="btn btn-success mb-3">+ Register New Student</a>
                <table class="table table-hover table-striped">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Major</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td>{{ student.first_name }} {{ student.last_name }}</td>
                            <td>{{ student.email }}</td>
                            <td>{{ student.age }}</td>
                            <td>{{ student.major }}</td>
                            <td>
    <a href="{% url 'edit_student' student.pk %}" class="btn btn-sm btn-warning">Edit</a>
    <form action="{% url 'delete_student' student.pk %}" method="POST" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</button>
    </form>
</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="5" class="text-center">No students registered yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
