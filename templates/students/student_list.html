<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School System - Student Directory</title>
    <!-- The Bootstrap "Magic Link" -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0 fs-4 fs-md-2">Student Directory</h2>
            <a href="{% url 'add_student' %}" class="btn btn-success"><strong>+</strong> Register New Student</a>
        </div>
        
        <div class="card-body">
            <!-- 1. ADDED THIS WRAPPER FOR MOBILE RESPONSIVENESS -->
            <div class="table-responsive">
            <table class="table table-hover table-striped align-middle border">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Major</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td><strong>{{ student.first_name }} {{ student.last_name }}</strong></td>
                        <td>{{ student.email }}</td>
                        <td>{{ student.age }}</td>
                        <td><span class="badge bg-secondary">{{ student.major }}</span></td>
                        <td class="text-center">
                            <!-- Grouping all actions cleanly inside ONE cell -->
                            <div class="btn-group" role="group">
                                <a href="{% url 'student_profile' student.id %}" class="btn btn-sm btn-outline-primary">
                                    View Dashboard
                                </a>
                                <a href="{% url 'edit_student' student.pk %}" class="btn btn-sm btn-warning">
                                    Edit
                                </a>
                                <form action="{% url 'delete_student' student.pk %}" method="POST" class="d-inline">
                                    {% csrf_token %}
                                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this student?')">
                                        Delete
                                    </button>
                                </form>
                            </div>
                         </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="5" class="text-center">No students registered yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
